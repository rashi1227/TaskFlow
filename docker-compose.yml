version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: taskmanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskmanager-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - JWT_SECRET=${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      - JWT_EXPIRATION=86400000
    depends_on:
      - mongodb
    networks:
      - taskmanager-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskmanager-net

volumes:
  mongo-data:

networks:
  taskmanager-net:
    driver: bridge
